baseURL = "https://bmccall17.github.io/portfolio"
languageCode = "en-us"
title = "Brett A McCall - Portfolio"
theme = ""

[params]
  author = "Brett A McCall"
  description = "Product leader specializing in spatial computing, React, Three.js, and modern web technologies"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[build]
  writeStats = true

[module]
  [module.mounts]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "static"
    target = "static"

[deployment]
  [[deployment.targets]]
    name = "github"
    URL = "https://github.com/bmccall17/portfolio"